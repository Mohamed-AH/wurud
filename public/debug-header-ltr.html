<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Header Debug - LTR</title>
  <style>
    :root{--primary-dark:#2C1810;--accent-gold:#C19A6B;--space-sm:8px;--font-arabic-display:'Scheherazade New',serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{direction:ltr;font-family:sans-serif}

    .header{background:linear-gradient(135deg,#2C1810 0%,#3D2419 100%);border-bottom:3px solid #C19A6B;position:sticky;top:0;z-index:1000;height:68px;display:flex;align-items:center}
    .header-content{max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;width:100%}
    .logo{display:flex;align-items:center;font-family:var(--font-arabic-display);font-size:22px;font-weight:700;color:#FAF7F2;text-decoration:none;line-height:1.3}
    .logo-text{display:block}
    .header-actions{display:flex;gap:var(--space-sm);align-items:center}
    #langToggle{background:transparent;color:#FAF7F2;border:2px solid #C19A6B;padding:8px 20px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
    .hamburger-btn{display:none;flex-direction:column;justify-content:center;align-items:center;width:44px;height:44px;background:rgba(193,154,107,0.15);border:2px solid var(--accent-gold);border-radius:8px;cursor:pointer;padding:10px;gap:5px}
    .hamburger-line{display:block;width:22px;height:3px;background:var(--accent-gold);border-radius:2px}

    /* Mobile - current fix */
    @media(max-width:768px){
      .header{height:auto;min-height:56px}
      .header-content{padding:12px 16px;gap:8px}
      .logo{display:block;font-size:15px;flex:1;min-width:0;line-height:1.4}
      .logo-text{display:block}
      .hamburger-btn{display:flex}
      .header-actions{flex-shrink:0;gap:var(--space-sm)}
      #langToggle{padding:6px 14px;font-size:13px}
    }
    @media(max-width:400px){
      .logo{font-size:14px}
      .header-content{padding:10px 12px}
      #langToggle{padding:5px 10px;font-size:12px}
    }

    /* Debug info */
    .debug{padding:20px;background:#f0f0f0;margin:20px}
    .debug p{margin:5px 0}
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="/" class="logo">
        <span class="logo-text">Sheikh Hasan bin Mohammed Mansour Dhaghriri</span>
      </a>
      <div class="header-actions">
        <button id="langToggle"><span>عربي</span></button>
        <button class="hamburger-btn">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
      </div>
    </div>
  </header>

  <div class="debug">
    <h2>Debug Info (LTR - English)</h2>
    <p>Screen width: <span id="width"></span>px</p>
    <p>Header content width: <span id="headerWidth"></span>px</p>
    <p>Logo width: <span id="logoWidth"></span>px</p>
    <p>Actions width: <span id="actionsWidth"></span>px</p>
    <p><a href="debug-header.html">Switch to RTL (Arabic)</a></p>
  </div>

  <script>
    function updateDebug() {
      document.getElementById('width').textContent = window.innerWidth;
      document.getElementById('headerWidth').textContent = document.querySelector('.header-content').offsetWidth;
      document.getElementById('logoWidth').textContent = document.querySelector('.logo').offsetWidth;
      document.getElementById('actionsWidth').textContent = document.querySelector('.header-actions').offsetWidth;
    }
    updateDebug();
    window.addEventListener('resize', updateDebug);
  </script>
</body>
</html>
